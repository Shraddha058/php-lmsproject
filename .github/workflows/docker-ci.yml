name: Docker CI
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          target: runtime
          tags: marketing-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker compose config
      - run: docker run --rm marketing-service:ci php -m | grep -E "pdo_mysql|mbstring|intl"
