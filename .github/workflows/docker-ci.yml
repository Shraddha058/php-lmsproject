name: Docker CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Fix Node 20 warning (optional but recommended)
      - name: Enable Node 24 for actions
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      # ✅ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t test-image .

      # ✅ Run container test (basic check)
      - name: Run Container Test
        run: |
          docker run -d --name test-container test-image
          docker ps

      # ✅ Check PHP modules (your Laravel requirement)
      - name: Verify PHP Extensions
        run: |
          docker exec test-container php -m | grep -E "pdo_mysql|mbstring|intl"

      # ✅ Cleanup
      - name: Cleanup
        run: |
          docker stop test-container
          docker rm test-container