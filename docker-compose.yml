services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: marketing-service:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-marketing}
      DB_USERNAME: ${DB_USERNAME:-marketing}
      DB_PASSWORD: ${DB_PASSWORD:-marketing}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - marketing-net

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: marketing
      MYSQL_USER: marketing
      MYSQL_PASSWORD: marketing
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - marketing-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umarketing", "-pmarketing"]
      interval: 10s
      timeout: 5s
      retries: 10
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./laravel:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - marketing-net   

networks:
  marketing-net:

volumes:
  db-data: